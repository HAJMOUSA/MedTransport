version: "3.9"

services:
  # ─── PostgreSQL + PostGIS ───────────────────────────────────────────────────
  db:
    image: postgis/postgis:16-3.4-alpine
    container_name: midtransport_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-midtransport}
      POSTGRES_USER: ${POSTGRES_USER:-midtransport}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./apps/api/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-midtransport}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: midtransport_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── API (Node.js + Express) ────────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: midtransport_api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-midtransport}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-midtransport}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    # API is NOT exposed publicly — nginx proxies /api/ internally
    expose:
      - "3001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads

  # ─── Web (React + Vite + Nginx reverse proxy) ────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        # Empty = use same origin (nginx proxies /api/ internally — no CORS ever)
        VITE_API_URL: ""
    container_name: midtransport_web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  db_data:
  redis_data:
  uploads_data:
